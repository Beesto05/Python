<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us!</title>
</head>
<body>
   <h1><center><ins>Contact Us!</ins></center></h1> <br><br>
   <div style="background-color: rgb(160, 164, 192);"><br><br>
    <form>
        <center><label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter Your Name" pattern="[A-Z/a-z]+" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter Your Email" required><br><br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter Your Phone Number" maxlength="10"><br><br>
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" placeholder="Enter Subject" required><br><br>
        <label for="message">Message:</label>
        <sub><textarea id="message" name="message" placeholder="Enter Your Message" required></textarea></sub><br><br>
        <button type="submit">Submit</button></center><br><br>

    </form>
   </div>
   <center><h5>&copy; 2026 Local Business. All rights reserved.</h5></center>
   
</body>
</html>
